<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pertanyaan Penting</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      overflow: hidden;
    }

    h1 {
      position: absolute;
      top: 30%;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      position: absolute;
      transition: transform 0.2s ease;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
      left: 45%;
      top: 60%;
      transform: scale(1);
    }

    #noBtn {
      background-color: #999;
      color: white;
      left: 55%;
      top: 60%;
    }
  </style>
</head>
<body>

<h1>Kamu masih semangat kan?😢</h1>

<button id="yesBtn">Iya</button>
<button id="noBtn">Ga</button>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");

  let scale = 1;

  const teaseTexts = [
    "Yakin ga? 😏",
    "Serius nih? 😆",
    "Ga bisa dipilih 😜",
    "Coba lagi 🤭",
    "Hayoo mau klik apa 😆",
    "Masa iya mau nyarah 😏",
    "Klik yang iya aja 😌",
    "Hehe ga bisa 😝",
    "Ups kabur! 🏃‍♂️",
    "Salah tombol bro 😆"
  ];

  document.addEventListener("mousemove", (e) => {
    const rect = noBtn.getBoundingClientRect();
    const distance = Math.hypot(
      e.clientX - (rect.left + rect.width / 2),
      e.clientY - (rect.top + rect.height / 2)
    );

    if (distance < 120) {
      // pindah posisi random
      const maxX = window.innerWidth - rect.width;
      const maxY = window.innerHeight - rect.height;

      noBtn.style.left = Math.random() * maxX + "px";
      noBtn.style.top = Math.random() * maxY + "px";

      // ganti teks ngejek
      const randomText = teaseTexts[Math.floor(Math.random() * teaseTexts.length)];
      noBtn.innerText = randomText;

      // tombol iya makin gede
      scale += 0.1;
      yesBtn.style.transform = `scale(${scale})`;
    }
  });

  yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
      <h1 style="text-align:center;">Sip, semangat terus no kendor-kendor 🔥❤️</h1>
    `;
  });
</script>

</body>
</html>
